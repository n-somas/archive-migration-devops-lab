services:
  web:
    build: .
    container_name: archive_migration_web
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/archive_db
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: archive_migration_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archive_db
    ports:
      - "5432:5432"
    volumes:
      - archive_postgres_data:/var/lib/postgresql/data

volumes:
  archive_postgres_data:
